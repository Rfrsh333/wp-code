name: Daily Maintenance

on:
  schedule:
    # Elke dag om 02:00 UTC (03:00 NL tijd)
    - cron: "0 2 * * *"
  workflow_dispatch: # Handmatig triggeren mogelijk

jobs:
  cleanup:
    name: Daily Cleanup & Reminders
    runs-on: ubuntu-latest
    steps:
      # LET OP: /api/cron/daily-cleanup en /api/cron/herinneringen draaien al via Vercel
      # Cron (zie vercel.json). Ze zijn hier bewust verwijderd om dubbele triggers te
      # voorkomen — klanten kregen betalingsherinneringen meermaals per dag (audit P1-25).
      # Alleen de job die NIET in Vercel Cron staat, draait hier.
      - name: Dienst herinneringen versturen
        run: |
          curl -s -X POST "${{ secrets.APP_URL }}/api/cron/dienst-herinneringen" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
