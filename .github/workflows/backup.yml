name: Automated Backups

on:
  schedule:
    # Database: dagelijks om 03:00 UTC (04:00 NL)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      backup_type:
        description: "Type backup"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - database
          - storage

jobs:
  database-backup:
    name: Database Backup
    runs-on: ubuntu-latest
    if: github.event.inputs.backup_type != 'storage'
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run database backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_DIR: backups/db
        run: bash scripts/backup-database.sh

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/db/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=⚠️ DATABASE BACKUP GEFAALD op $(date +%Y-%m-%d). Check GitHub Actions." \
            -d "parse_mode=HTML" || true

  storage-backup:
    name: Storage Backup
    runs-on: ubuntu-latest
    # Storage: alleen op zondag om 04:00 UTC, of handmatig
    if: (github.event.schedule == '0 3 * * *' && github.event.inputs.backup_type != 'database') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run storage backup
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STORAGE_BACKUP_DIR: backups/storage
        run: bash scripts/backup-storage.sh

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: storage-backup-${{ github.run_id }}
          path: backups/storage/
          retention-days: 14

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=⚠️ STORAGE BACKUP GEFAALD op $(date +%Y-%m-%d). Check GitHub Actions." \
            -d "parse_mode=HTML" || true

  verify:
    name: Verify Backups
    runs-on: ubuntu-latest
    needs: [database-backup]
    if: always() && needs.database-backup.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download DB backup
        uses: actions/download-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/db/

      - name: Verify backup integrity
        run: |
          LATEST=$(find backups/db -name "*.sql.gz" -type f | sort -r | head -1)
          if [ -z "$LATEST" ]; then
            echo "FOUT: Geen backup gevonden!"
            exit 1
          fi
          echo "Verificatie van: $LATEST"
          gzip -t "$LATEST"
          SIZE=$(du -h "$LATEST" | cut -f1)
          echo "Integriteit OK — grootte: $SIZE"

          # Check minimale grootte (lege DB dump zou < 10KB zijn)
          BYTES=$(stat -c%s "$LATEST" 2>/dev/null || stat -f%z "$LATEST" 2>/dev/null || echo 0)
          if [ "$BYTES" -lt 10000 ]; then
            echo "WAARSCHUWING: Backup is verdacht klein ($BYTES bytes)"
            exit 1
          fi
          echo "Grootte check OK ($BYTES bytes)"
