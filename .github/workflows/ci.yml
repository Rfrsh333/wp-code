name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npx next lint --max-warnings 150

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    env:
      # Dummy values voor build check (echte waarden staan in Vercel)
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder"
      RESEND_API_KEY: "re_placeholder"
      JWT_SECRET: "placeholder_jwt_secret_for_ci_build_check"
      OPENAI_API_KEY: "sk-placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run build
